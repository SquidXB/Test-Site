<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="calcStyle.css">
    <title>Calculator</title>
</head>
<body>
    <div class="calculator">
            <section class="result" id="display">0</section>
        <div class="calcButtonRow">
            <button class="calcButton" id="clear">C</button>
            <button class="calcButton" id="back">&leftarrow;</button>
            <button class="calcButton" id="div">&divide;</button>
        </div>
        <div class="calcButtonRow">
            <button class="calcButton" id="7">7</button>
            <button class="calcButton" id="8">8</button>
            <button class="calcButton" id="9">9</button>
            <button class="calcButton" id="mult">&times;</button>
        </div>
        <div class="calcButtonRow">
            <button class="calcButton" id="4">4</button>
            <button class="calcButton" id="5">5</button>
            <button class="calcButton" id="6">6</button>
            <button class="calcButton" id="minus">&minus;</button>
        </div>
        <div class="calcButtonRow">
            <button class="calcButton" id="1">1</button>
            <button class="calcButton" id="2">2</button>
            <button class="calcButton" id="3">3</button>
            <button class="calcButton" id="plus">&plus;</button>
        </div>
        <div class="calcButtonRow">
            <button class="calcButton" id="zero">0</button>
            <button class="calcButton" id="equal">&equals;</button>
        </div>
    </div>

    <script src="calcScript.js"></script>
</body>
</html>
